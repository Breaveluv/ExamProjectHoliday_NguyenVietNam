<!DOCTYPE html>
<!--
    templates/transfers/list.html
    ============================================================
    Transfer Management - List Page
    ============================================================
-->
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layouts/main :: head('Transfer Management')}"></head>

<body>

<div th:replace="~{layouts/main :: overlay}"></div>
<nav th:replace="~{layouts/main :: sidebar}"></nav>
<header th:replace="~{layouts/main :: topbar('Transfer Management')}"></header>

<main id="main-content">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="page-title">
                <i class="bi bi-arrow-left-right me-2 text-primary-custom"></i>Transfer Management
            </h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item active">Transfers</li>
                </ol>
            </nav>
        </div>
        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/transfers/new}" class="btn btn-primary" id="add-transfer-btn">
                <i class="bi bi-plus-lg"></i> Record Transfer
            </a>
        </div>
    </div>

    <!-- Alerts -->
    <div th:if="${successMessage}" class="alert alert-success mb-4" role="alert" data-auto-dismiss="4000">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger mb-4" role="alert" data-auto-dismiss="4000">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Card -->
    <div class="card">
        <div class="card-header">
            <div>
                <div class="card-header-title">All Transfers</div>
                <div class="card-header-subtitle">Track player movements</div>
            </div>
            <!-- Search -->
            <form class="search-form" th:action="@{/transfers}" method="get">
                <div class="search-input-group">
                    <span class="search-icon-inner"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control search-input"
                           name="keyword" th:value="${keyword}"
                           placeholder="Search transfers…">
                </div>
                <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-search"></i></button>
                <a th:href="@{/transfers}" class="btn btn-secondary btn-sm"
                   th:if="${keyword != null and keyword != ''}"><i class="bi bi-x-lg"></i></a>
            </form>
        </div>

        <div class="card-body p-0">
            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(transfers)}" class="empty-state">
                <div class="empty-state-icon"><i class="bi bi-arrow-left-right"></i></div>
                <div class="empty-state-title">No Transfers Found</div>
                <div class="empty-state-text">Record the first player transfer.</div>
                <a th:href="@{/transfers/new}" class="btn btn-primary mt-3"
                   sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-plus-lg"></i> Record First Transfer
                </a>
            </div>

            <!-- Table -->
            <div th:unless="${#lists.isEmpty(transfers)}" class="table-responsive">
                <table class="table" id="transfers-table">
                    <thead>
                        <tr>
                            <th class="sortable">#<i class="sort-icon bi bi-arrow-down-up"></i></th>
                            <th>Player</th>
                            <th>From Team</th>
                            <th>To Team</th>
                            <th class="sortable">Date<i class="sort-icon bi bi-arrow-down-up"></i></th>
                            <th>Fee</th>
                            <th sec:authorize="hasRole('ADMIN')">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="transfer, iterStat : ${transfers}">
                            <td class="text-muted-custom fw-500" th:text="${iterStat.count}">1</td>

                            <!-- Player -->
                            <td>
                                <div class="fw-600" th:text="${transfer.playerName}">Player</div>
                            </td>

                            <!-- From Team -->
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="badge badge-danger text-white px-2 py-1" style="font-size:10px;">OUT</span>
                                    <span th:text="${transfer.oldTeamName != null ? transfer.oldTeamName : 'Free Agent'}">From</span>
                                </div>
                            </td>

                            <!-- To Team -->
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="badge badge-success text-white px-2 py-1" style="font-size:10px;">IN</span>
                                    <span class="fw-600 text-primary-custom" th:text="${transfer.newTeamName}">To</span>
                                </div>
                            </td>

                            <!-- Date -->
                            <td>
                                <i class="bi bi-calendar3 text-muted-custom me-1"></i>
                                <span th:text="${#temporals.format(transfer.transferDate, 'dd MMM yyyy')}">Date</span>
                            </td>

                            <!-- Fee -->
                            <td>
                                <span th:if="${transfer.transferFee != null and transfer.transferFee > 0}"
                                      class="fw-700" style="color:var(--warning);"
                                      th:text="${'$' + #numbers.formatDecimal(transfer.transferFee, 1, 'COMMA', 2, 'POINT')}">$0.00</span>
                                <span th:if="${transfer.transferFee == null or transfer.transferFee == 0}"
                                      class="badge badge-neutral">Free</span>
                            </td>

                            <!-- Actions -->
                            <td sec:authorize="hasRole('ADMIN')">
                                <div class="action-btns">
                                    <a th:href="@{/transfers/edit/{id}(id=${transfer.id})}"
                                       class="btn btn-info btn-sm">
                                        <i class="bi bi-pencil-fill"></i> Edit
                                    </a>
                                    <button type="button"
                                            class="btn btn-danger btn-sm"
                                            data-bs-toggle="modal"
                                            data-bs-target="#deleteConfirmModal"
                                            th:data-delete-url="@{/transfers/delete/{id}(id=${transfer.id})}"
                                            th:data-entity-name="${'Transfer of ' + transfer.playerName}">
                                        <i class="bi bi-trash3-fill"></i> Delete
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer d-flex align-items-center justify-content-between flex-wrap gap-3"
             th:if="${totalPages != null and totalPages > 1}">
            <div class="text-muted-custom" style="font-size:13px;">
                Page <strong th:text="${currentPage + 1}">1</strong>
                of <strong th:text="${totalPages}">1</strong>
            </div>
            <nav aria-label="Transfers pagination">
                <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/transfers(page=${currentPage - 1}, keyword=${keyword})}"><i class="bi bi-chevron-left"></i></a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:text="${i + 1}" th:href="@{/transfers(page=${i}, keyword=${keyword})}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/transfers(page=${currentPage + 1}, keyword=${keyword})}"><i class="bi bi-chevron-right"></i></a>
                    </li>
                </ul>
            </nav>
        </div>

    </div>

    <footer th:replace="~{layouts/main :: footer}"></footer>
</main>

<div th:replace="~{layouts/main :: deleteModal}"></div>
<div th:replace="~{layouts/main :: toastContainer}"></div>
<div th:replace="~{layouts/main :: scripts}"></div>

</body>
</html>
