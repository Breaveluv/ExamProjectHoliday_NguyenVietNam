<!DOCTYPE html>
<!--
    templates/matches/form.html
    ============================================================
    Match Management - Create / Edit Form
    ============================================================
-->
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layouts/main :: head('Match Form')}"></head>

<body>

<div th:replace="~{layouts/main :: overlay}"></div>
<nav th:replace="~{layouts/main :: sidebar}"></nav>
<header th:replace="~{layouts/main :: topbar('Match Form')}"></header>

<main id="main-content">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="page-title"
                th:text="${match.id == null ? '➕ Schedule New Match' : '✏️ Edit Match'}">
                Match Form
            </h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/matches}">Matches</a></li>
                    <li class="breadcrumb-item active"
                        th:text="${match.id == null ? 'Schedule' : 'Edit'}">Form</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/matches}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Back to Matches
        </a>
    </div>

    <!-- Error Alert -->
    <div th:if="${errorMessage}" class="alert alert-danger mb-4" role="alert">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Form Card -->
    <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
            <div class="card">
                <div class="card-header">
                    <div>
                        <div class="card-header-title">
                            <i class="bi bi-calendar2-event-fill me-2 text-primary-custom"></i>
                            <span th:text="${match.id == null ? 'New Match Details' : 'Edit Match Details'}">
                                Match Details
                            </span>
                        </div>
                        <div class="card-header-subtitle">Fill in the match information</div>
                    </div>
                </div>

                <div class="card-body">
                    <form th:action="${match.id == null} ? @{/matches/new} : @{/matches/edit/{id}(id=${match.id})}"
                          th:object="${match}"
                          method="post"
                          id="matchForm">

                        <input type="hidden" th:field="*{id}" th:if="${match.id != null}">

                        <!-- Section: Teams -->
                        <div class="form-section-label">Teams</div>

                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="homeTeamId" class="form-label">
                                    <i class="bi bi-house-fill text-primary-custom me-1"></i>
                                    Home Team <span class="text-danger">*</span>
                                </label>
                                <select class="form-select"
                                        id="homeTeamId"
                                        th:field="*{homeTeamId}"
                                        th:classappend="${#fields.hasErrors('homeTeamId')} ? 'is-invalid'">
                                    <option value="">— Select Home Team —</option>
                                    <option th:each="team : ${teams}"
                                            th:value="${team.id}"
                                            th:text="${team.name}"
                                            th:selected="${team.id == match.homeTeamId}">
                                    </option>
                                </select>
                                <div class="field-error" th:if="${#fields.hasErrors('homeTeamId')}"
                                     th:errors="*{homeTeamId}"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="awayTeamId" class="form-label">
                                    <i class="bi bi-airplane-fill text-danger me-1"></i>
                                    Away Team <span class="text-danger">*</span>
                                </label>
                                <select class="form-select"
                                        id="awayTeamId"
                                        th:field="*{awayTeamId}"
                                        th:classappend="${#fields.hasErrors('awayTeamId')} ? 'is-invalid'">
                                    <option value="">— Select Away Team —</option>
                                    <option th:each="team : ${teams}"
                                            th:value="${team.id}"
                                            th:text="${team.name}"
                                            th:selected="${team.id == match.awayTeamId}">
                                    </option>
                                </select>
                                <div class="field-error" th:if="${#fields.hasErrors('awayTeamId')}"
                                     th:errors="*{awayTeamId}"></div>
                            </div>
                        </div>

                        <!-- Section: Schedule -->
                        <div class="form-section-label mt-4">Schedule & Venue</div>

                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="matchDate" class="form-label">
                                    Date &amp; Time <span class="text-danger">*</span>
                                </label>
                                <input type="datetime-local"
                                       class="form-control"
                                       id="matchDate"
                                       th:field="*{matchDate}"
                                       th:classappend="${#fields.hasErrors('matchDate')} ? 'is-invalid'">
                                <div class="field-error" th:if="${#fields.hasErrors('matchDate')}"
                                     th:errors="*{matchDate}"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="location" class="form-label">
                                    Location / Venue <span class="text-danger">*</span>
                                </label>
                                <input type="text"
                                       class="form-control"
                                       id="location"
                                       th:field="*{location}"
                                       th:classappend="${#fields.hasErrors('location')} ? 'is-invalid'"
                                       placeholder="e.g. Wembley Stadium">
                                <div class="field-error" th:if="${#fields.hasErrors('location')}"
                                     th:errors="*{location}"></div>
                            </div>
                        </div>

                        <!-- Section: Result -->
                        <div class="form-section-label mt-4">Result (optional)</div>

                        <div class="row g-3">
                            <div class="col-12 col-md-4">
                                <label for="homeScore" class="form-label">Home Score</label>
                                <input type="number"
                                       class="form-control"
                                       id="homeScore"
                                       th:field="*{homeScore}"
                                       th:classappend="${#fields.hasErrors('homeScore')} ? 'is-invalid'"
                                       placeholder="0"
                                       min="0">
                                <div class="field-error" th:if="${#fields.hasErrors('homeScore')}"
                                     th:errors="*{homeScore}"></div>
                            </div>

                            <div class="col-12 col-md-4">
                                <label for="awayScore" class="form-label">Away Score</label>
                                <input type="number"
                                       class="form-control"
                                       id="awayScore"
                                       th:field="*{awayScore}"
                                       th:classappend="${#fields.hasErrors('awayScore')} ? 'is-invalid'"
                                       placeholder="0"
                                       min="0">
                                <div class="field-error" th:if="${#fields.hasErrors('awayScore')}"
                                     th:errors="*{awayScore}"></div>
                            </div>

                            <div class="col-12 col-md-4">
                                <label for="status" class="form-label">
                                    Status <span class="text-danger">*</span>
                                </label>
                                <input type="text"
                                       class="form-control"
                                       id="status"
                                       th:field="*{status}"
                                       th:classappend="${#fields.hasErrors('status')} ? 'is-invalid'"
                                       placeholder="e.g. Scheduled, Completed">
                                <div class="field-error" th:if="${#fields.hasErrors('status')}"
                                     th:errors="*{status}"></div>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex gap-2 pt-2 mt-4 border-top">
                            <button type="submit" class="btn btn-primary" id="save-match-btn">
                                <i class="bi bi-floppy-fill"></i>
                                <span th:text="${match.id == null ? 'Schedule Match' : 'Save Changes'}">Save</span>
                            </button>
                            <button type="reset" class="btn btn-secondary">
                                <i class="bi bi-arrow-counterclockwise"></i> Reset
                            </button>
                            <a th:href="@{/matches}" class="btn btn-secondary ms-auto">
                                <i class="bi bi-x-lg"></i> Cancel
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{layouts/main :: footer}"></footer>
</main>

<div th:replace="~{layouts/main :: toastContainer}"></div>
<div th:replace="~{layouts/main :: scripts}"></div>

</body>
</html>
