<!DOCTYPE html>
<!--
    templates/auth/login.html
    ============================================================
    Login Page - Modern Full-Screen Design
    ============================================================
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Football Club Management System">
    <title>Login | Football Club MS</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- ============================================================
     AUTH PAGE WRAPPER
============================================================ -->
<div class="auth-page">

    <!-- Auth Card -->
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">
                <i class="bi bi-trophy-fill"></i>
            </div>
            <div class="logo-title">Football Club MS</div>
            <div class="logo-sub">Management System</div>
        </div>

        <!-- Heading -->
        <h1 class="auth-heading">Welcome back!</h1>
        <p class="auth-subheading">Sign in to continue to your dashboard.</p>

        <!-- Error Alert -->
        <div th:if="${param.error}"
             class="alert alert-danger mb-3" role="alert" data-auto-dismiss="5000">
            <i class="bi bi-exclamation-circle-fill"></i>
            Invalid username or password. Please try again.
        </div>

        <!-- Logout Success Alert -->
        <div th:if="${param.logout}"
             class="alert alert-success mb-3" role="alert" data-auto-dismiss="4000">
            <i class="bi bi-check-circle-fill"></i>
            You have been logged out successfully.
        </div>

        <!-- Login Form -->
        <form th:action="@{/perform_login}" method="post" id="loginForm">

            <!-- Username -->
            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="bi bi-person me-1"></i>Username or Email
                </label>
                <div class="position-relative">
                    <input type="text"
                           class="form-control"
                           id="username"
                           name="username"
                           placeholder="Enter your username or email"
                           autocomplete="username"
                           required
                           autofocus>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label">
                    <i class="bi bi-lock me-1"></i>Password
                </label>
                <div class="password-wrapper">
                    <input type="password"
                           class="form-control"
                           id="password"
                           name="password"
                           placeholder="Enter your password"
                           autocomplete="current-password"
                           required>
                    <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
            </div>

            <!-- Remember Me + Forgot -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div class="form-check mb-0">
                    <input class="form-check-input" type="checkbox"
                           id="rememberMe" name="remember-me">
                    <label class="form-check-label" for="rememberMe"
                           style="font-size:13px; color: var(--text-secondary);">
                        Remember me
                    </label>
                </div>
                <a href="#"
                   style="font-size:13px; font-weight:600; color: var(--primary); text-decoration:none;">
                    Forgot password?
                </a>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100" id="login-btn"
                    style="padding: 12px; font-size: 14px;">
                <i class="bi bi-box-arrow-in-right me-1"></i>
                Sign In
            </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">
            <span>or</span>
        </div>

        <!-- Register Link -->
        <p class="auth-footer-text">
            Don't have an account?
            <a th:href="@{/register}">Create account</a>
        </p>
    </div><!-- /.auth-card -->

</div><!-- /.auth-page -->

<!-- Bootstrap 5.3 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<!-- Custom App JS -->
<script th:src="@{/js/app.js}"></script>

</body>
</html>
