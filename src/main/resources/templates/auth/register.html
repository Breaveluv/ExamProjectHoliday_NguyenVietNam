<!DOCTYPE html>
<!--
    templates/auth/register.html
    ============================================================
    Register Page - Consistent with Login Design
    ============================================================
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for Football Club Management System">
    <title>Register | Football Club MS</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- ============================================================
     AUTH PAGE WRAPPER
============================================================ -->
<div class="auth-page">

    <!-- Auth Card -->
    <div class="auth-card" style="max-width: 460px;">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">
                <i class="bi bi-trophy-fill"></i>
            </div>
            <div class="logo-title">Football Club MS</div>
            <div class="logo-sub">Management System</div>
        </div>

        <!-- Heading -->
        <h1 class="auth-heading">Create account</h1>
        <p class="auth-subheading">Join the Football Club Management System.</p>

        <!-- Success Alert -->
        <div th:if="${param.success}"
             class="alert alert-success mb-3" role="alert" data-auto-dismiss="5000">
            <i class="bi bi-check-circle-fill"></i>
            Registration successful! Please
            <a th:href="@{/login}" class="alert-link">login here</a>.
        </div>

        <!-- Error Alert -->
        <div th:if="${param.error}"
             class="alert alert-danger mb-3" role="alert" data-auto-dismiss="5000">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${param.error}">Registration failed.</span>
        </div>

        <!-- Register Form -->
        <form th:action="@{/auth/register}" method="post" id="registerForm">

            <!-- Username -->
            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="bi bi-person me-1"></i>Username
                </label>
                <input type="text"
                       class="form-control"
                       id="username"
                       name="username"
                       placeholder="Choose a username"
                       autocomplete="username"
                       required
                       autofocus>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">
                    <i class="bi bi-envelope me-1"></i>Email Address
                </label>
                <input type="email"
                       class="form-control"
                       id="email"
                       name="email"
                       placeholder="Enter your email"
                       autocomplete="email"
                       required>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label">
                    <i class="bi bi-lock me-1"></i>Password
                </label>
                <div class="password-wrapper">
                    <input type="password"
                           class="form-control"
                           id="password"
                           name="password"
                           placeholder="Create a strong password"
                           autocomplete="new-password"
                           required>
                    <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
                <small class="text-muted" style="font-size:11.5px; margin-top:5px; display:block;">
                    Password must be at least 8 characters.
                </small>
            </div>

            <!-- Terms -->
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox"
                       id="agreeTerms" name="agreeTerms" required>
                <label class="form-check-label" for="agreeTerms"
                       style="font-size:13px; color: var(--text-secondary);">
                    I agree to the
                    <a href="#" style="color: var(--primary); font-weight:600; text-decoration:none;">
                        Terms of Service
                    </a>
                    and
                    <a href="#" style="color: var(--primary); font-weight:600; text-decoration:none;">
                        Privacy Policy
                    </a>
                </label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100" id="register-btn"
                    style="padding: 12px; font-size: 14px;">
                <i class="bi bi-person-plus-fill me-1"></i>
                Create Account
            </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">
            <span>or</span>
        </div>

        <!-- Login Link -->
        <p class="auth-footer-text">
            Already have an account?
            <a th:href="@{/login}">Sign in</a>
        </p>
    </div><!-- /.auth-card -->

</div><!-- /.auth-page -->

<!-- Bootstrap 5.3 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<!-- Custom App JS -->
<script th:src="@{/js/app.js}"></script>

</body>
</html>
