<!DOCTYPE html>
<!--
    templates/statistics/list.html
    ============================================================
    Player Statistics Management - List Page
    ============================================================
-->
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layouts/main :: head('Player Statistics')}"></head>

<body>

<div th:replace="~{layouts/main :: overlay}"></div>
<nav th:replace="~{layouts/main :: sidebar}"></nav>
<header th:replace="~{layouts/main :: topbar('Player Statistics')}"></header>

<main id="main-content">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="page-title">
                <i class="bi bi-bar-chart-fill me-2 text-primary-custom"></i>Player Statistics
            </h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item active">Statistics</li>
                </ol>
            </nav>
        </div>
        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/statistics/new}" class="btn btn-primary" id="add-stat-btn">
                <i class="bi bi-plus-lg"></i> Add Match Stats
            </a>
        </div>
    </div>

    <!-- Alerts -->
    <div th:if="${successMessage}" class="alert alert-success mb-4" role="alert" data-auto-dismiss="4000">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger mb-4" role="alert" data-auto-dismiss="4000">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Card -->
    <div class="card">
        <div class="card-header">
            <div>
                <div class="card-header-title">All Match Statistics</div>
                <div class="card-header-subtitle">Performance tracking per match</div>
            </div>
            <!-- Search -->
            <form class="search-form" th:action="@{/statistics}" method="get">
                <div class="search-input-group">
                    <span class="search-icon-inner"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control search-input"
                           name="keyword" th:value="${keyword}"
                           placeholder="Search stats…">
                </div>
                <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-search"></i></button>
                <a th:href="@{/statistics}" class="btn btn-secondary btn-sm"
                   th:if="${keyword != null and keyword != ''}"><i class="bi bi-x-lg"></i></a>
            </form>
        </div>

        <div class="card-body p-0">
            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(statistics)}" class="empty-state">
                <div class="empty-state-icon"><i class="bi bi-bar-chart"></i></div>
                <div class="empty-state-title">No Statistics Found</div>
                <div class="empty-state-text">Add player match statistics.</div>
                <a th:href="@{/statistics/new}" class="btn btn-primary mt-3"
                   sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-plus-lg"></i> Add First Stats
                </a>
            </div>

            <!-- Table -->
            <div th:unless="${#lists.isEmpty(statistics)}" class="table-responsive">
                <table class="table" id="statistics-table">
                    <thead>
                        <tr>
                            <th class="sortable">#<i class="sort-icon bi bi-arrow-down-up"></i></th>
                            <th>Player</th>
                            <th>Match</th>
                            <th class="text-center sortable">Goals<i class="sort-icon bi bi-arrow-down-up"></i></th>
                            <th class="text-center sortable">Assists<i class="sort-icon bi bi-arrow-down-up"></i></th>
                            <th class="text-center sortable">Yellow<i class="sort-icon bi bi-arrow-down-up"></i></th>
                            <th class="text-center sortable">Red<i class="sort-icon bi bi-arrow-down-up"></i></th>
                            <th class="text-center sortable">Minutes<i class="sort-icon bi bi-arrow-down-up"></i></th>
                            <th sec:authorize="hasRole('ADMIN')">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="stat, iterStat : ${statistics}">
                            <td class="text-muted-custom fw-500" th:text="${iterStat.count}">1</td>

                            <!-- Player -->
                            <td>
                                <div class="fw-600" th:text="${stat.playerName}">Player Name</div>
                            </td>

                            <!-- Match -->
                            <td>
                                <div th:if="${stat.matchDescription != null}" style="font-size:13px;">
                                    <span th:text="${stat.matchDescription}">Match</span>
                                </div>
                                <div th:if="${stat.matchDescription == null}" class="text-muted-custom">—</div>
                            </td>

                            <!-- Stats columns -->
                            <td class="text-center">
                                <span class="badge badge-success px-2 py-1 fs-12 fw-700" th:text="${stat.goals}">0</span>
                            </td>
                            <td class="text-center">
                                <span class="badge badge-info px-2 py-1 fs-12 fw-700" th:text="${stat.assists}">0</span>
                            </td>
                            <td class="text-center">
                                <span class="badge badge-warning text-white px-2 py-1 fs-12 fw-700" th:text="${stat.yellowCards}">0</span>
                            </td>
                            <td class="text-center">
                                <span class="badge badge-danger px-2 py-1 fs-12 fw-700" th:text="${stat.redCards}">0</span>
                            </td>
                            <td class="text-center fw-600 text-muted-custom">
                                <span th:text="${stat.minutesPlayed}">0</span>'
                            </td>

                            <!-- Actions -->
                            <td sec:authorize="hasRole('ADMIN')">
                                <div class="action-btns">
                                    <a th:href="@{/statistics/edit/{id}(id=${stat.id})}"
                                       class="btn btn-info btn-sm">
                                        <i class="bi bi-pencil-fill"></i> Edit
                                    </a>
                                    <button type="button"
                                            class="btn btn-danger btn-sm"
                                            data-bs-toggle="modal"
                                            data-bs-target="#deleteConfirmModal"
                                            th:data-delete-url="@{/statistics/delete/{id}(id=${stat.id})}"
                                            th:data-entity-name="${'Stats for ' + stat.playerName}">
                                        <i class="bi bi-trash3-fill"></i> Delete
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer d-flex align-items-center justify-content-between flex-wrap gap-3"
             th:if="${totalPages != null and totalPages > 1}">
            <div class="text-muted-custom" style="font-size:13px;">
                Page <strong th:text="${currentPage + 1}">1</strong>
                of <strong th:text="${totalPages}">1</strong>
            </div>
            <nav aria-label="Stats pagination">
                <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/statistics(page=${currentPage - 1}, keyword=${keyword})}"><i class="bi bi-chevron-left"></i></a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:text="${i + 1}" th:href="@{/statistics(page=${i}, keyword=${keyword})}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/statistics(page=${currentPage + 1}, keyword=${keyword})}"><i class="bi bi-chevron-right"></i></a>
                    </li>
                </ul>
            </nav>
        </div>

    </div>

    <footer th:replace="~{layouts/main :: footer}"></footer>
</main>

<div th:replace="~{layouts/main :: deleteModal}"></div>
<div th:replace="~{layouts/main :: toastContainer}"></div>
<div th:replace="~{layouts/main :: scripts}"></div>

</body>
</html>
