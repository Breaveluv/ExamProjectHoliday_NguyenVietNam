<!DOCTYPE html>
<!--
    templates/coaches/form.html
    ============================================================
    Coach Management - Create / Edit Form
    ============================================================
-->
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layouts/main :: head('Coach Form')}"></head>

<body>

<div th:replace="~{layouts/main :: overlay}"></div>
<nav th:replace="~{layouts/main :: sidebar}"></nav>
<header th:replace="~{layouts/main :: topbar('Coach Form')}"></header>

<main id="main-content">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="page-title"
                th:text="${coach.id == null ? '➕ Create New Coach' : '✏️ Edit Coach'}">
                Coach Form
            </h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/coaches}">Coaches</a></li>
                    <li class="breadcrumb-item active"
                        th:text="${coach.id == null ? 'Create' : 'Edit'}">Form</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/coaches}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Back to Coaches
        </a>
    </div>

    <!-- Error Alert -->
    <div th:if="${errorMessage}" class="alert alert-danger mb-4" role="alert">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Form Card -->
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-6">
            <div class="card">
                <div class="card-header">
                    <div>
                        <div class="card-header-title">
                            <i class="bi bi-person-video3 me-2 text-primary-custom"></i>
                            <span th:text="${coach.id == null ? 'New Coach Details' : 'Edit Coach Details'}">
                                Coach Details
                            </span>
                        </div>
                        <div class="card-header-subtitle">Fill in the coach information</div>
                    </div>
                </div>

                <div class="card-body">
                    <form th:action="${coach.id == null} ? @{/coaches/new} : @{/coaches/edit/{id}(id=${coach.id})}"
                          th:object="${coach}"
                          method="post"
                          id="coachForm">

                        <input type="hidden" th:field="*{id}" th:if="${coach.id != null}">

                        <!-- Section: Personal Info -->
                        <div class="form-section-label">Personal Information</div>

                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="firstName" class="form-label">
                                    First Name
                                </label>
                                <input type="text"
                                       class="form-control"
                                       id="firstName"
                                       th:field="*{firstName}"
                                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                       placeholder="First name">
                                <div class="field-error" th:if="${#fields.hasErrors('firstName')}"
                                     th:errors="*{firstName}"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="lastName" class="form-label">
                                    Last Name
                                </label>
                                <input type="text"
                                       class="form-control"
                                       id="lastName"
                                       th:field="*{lastName}"
                                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                       placeholder="Last name">
                                <div class="field-error" th:if="${#fields.hasErrors('lastName')}"
                                     th:errors="*{lastName}"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="dateOfBirth" class="form-label">Date of Birth</label>
                                <input type="date"
                                       class="form-control"
                                       id="dateOfBirth"
                                       th:field="*{dateOfBirth}"
                                       th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'">
                                <div class="field-error" th:if="${#fields.hasErrors('dateOfBirth')}"
                                     th:errors="*{dateOfBirth}"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="nationality" class="form-label">Nationality</label>
                                <input type="text"
                                       class="form-control"
                                       id="nationality"
                                       th:field="*{nationality}"
                                       th:classappend="${#fields.hasErrors('nationality')} ? 'is-invalid'"
                                       placeholder="e.g. German">
                                <div class="field-error" th:if="${#fields.hasErrors('nationality')}"
                                     th:errors="*{nationality}"></div>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex gap-2 pt-2 mt-4 border-top">
                            <button type="submit" class="btn btn-primary" id="save-coach-btn">
                                <i class="bi bi-floppy-fill"></i>
                                <span th:text="${coach.id == null ? 'Create Coach' : 'Save Changes'}">Save</span>
                            </button>
                            <button type="reset" class="btn btn-secondary">
                                <i class="bi bi-arrow-counterclockwise"></i> Reset
                            </button>
                            <a th:href="@{/coaches}" class="btn btn-secondary ms-auto">
                                <i class="bi bi-x-lg"></i> Cancel
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{layouts/main :: footer}"></footer>
</main>

<div th:replace="~{layouts/main :: toastContainer}"></div>
<div th:replace="~{layouts/main :: scripts}"></div>

</body>
</html>
