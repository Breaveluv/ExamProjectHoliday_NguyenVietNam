<!DOCTYPE html>
<!--
    templates/users/form.html
    ============================================================
    User Management - Create / Edit Form
    ============================================================
-->
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layouts/main :: head('User Form')}"></head>

<body>

<div th:replace="~{layouts/main :: overlay}"></div>
<nav th:replace="~{layouts/main :: sidebar}"></nav>
<header th:replace="~{layouts/main :: topbar('User Form')}"></header>

<main id="main-content">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="page-title"
                th:text="${user.id == null ? '➕ Create New User' : '✏️ Edit User'}">
                User Form
            </h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/users}">Users</a></li>
                    <li class="breadcrumb-item active"
                        th:text="${user.id == null ? 'Create' : 'Edit'}">Form</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/users}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Back to Users
        </a>
    </div>

    <!-- Error Alert -->
    <div th:if="${errorMessage}" class="alert alert-danger mb-4" role="alert">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Form Card -->
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-7">
            <div class="card">
                <div class="card-header">
                    <div>
                        <div class="card-header-title">
                            <i class="bi bi-person-fill text-primary-custom me-2"></i>
                            <span th:text="${user.id == null ? 'New User Details' : 'Edit User Details'}">
                                User Details
                            </span>
                        </div>
                        <div class="card-header-subtitle">System account configuration</div>
                    </div>
                </div>

                <div class="card-body">
                    <form th:action="${user.id == null} ? @{/users/new} : @{/users/edit/{id}(id=${user.id})}"
                          th:object="${user}"
                          method="post"
                          id="userForm">

                        <input type="hidden" th:field="*{id}" th:if="${user.id != null}">

                        <!-- Section: Credentials -->
                        <div class="form-section-label">Account Credentials</div>

                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="username" class="form-label">
                                    Username <span class="text-danger">*</span>
                                </label>
                                <input type="text"
                                       class="form-control"
                                       id="username"
                                       th:field="*{username}"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                       placeholder="Enter username">
                                <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="email" class="form-label">
                                    Email Address <span class="text-danger">*</span>
                                </label>
                                <input type="email"
                                       class="form-control"
                                       id="email"
                                       th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       placeholder="user@example.com">
                                <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>

                            <!-- Password field (only managed/shown on creation since UserDto has no password) -->
                            <div class="col-12 col-md-6" th:if="${user.id == null}">
                                <label for="password" class="form-label">
                                    Password <span class="text-danger">*</span>
                                </label>
                                <div class="password-wrapper">
                                    <input type="password"
                                           class="form-control"
                                           id="password"
                                           th:field="*{password}"
                                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                           placeholder="Enter password">
                                    <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                                        <i class="bi bi-eye-slash"></i>
                                    </button>
                                </div>
                                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            </div>
                        </div>

                        <!-- Section: Roles -->
                        <div class="form-section-label mt-4">Roles & Permissions</div>

                        <div class="mb-3">
                            <label for="roleId" class="form-label">Assign Role <span class="text-danger">*</span></label>
                            <select class="form-select"
                                    id="roleId"
                                    th:field="*{roleId}"
                                    th:classappend="${#fields.hasErrors('roleId')} ? 'is-invalid'">
                                <option value="">— Select Role —</option>
                                <option th:each="role : ${roles}"
                                        th:value="${role.id}"
                                        th:text="${role.name}"
                                        th:selected="${role.id == user.roleId}">
                                </option>
                            </select>
                            <div class="field-error" th:if="${#fields.hasErrors('roleId')}" th:errors="*{roleId}"></div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex gap-2 pt-2 mt-4 border-top">
                            <button type="submit" class="btn btn-primary" id="save-user-btn">
                                <i class="bi bi-floppy-fill"></i>
                                <span th:text="${user.id == null ? 'Create User' : 'Save Changes'}">Save</span>
                            </button>
                            <button type="reset" class="btn btn-secondary">
                                <i class="bi bi-arrow-counterclockwise"></i> Reset
                            </button>
                            <a th:href="@{/users}" class="btn btn-secondary ms-auto">
                                <i class="bi bi-x-lg"></i> Cancel
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{layouts/main :: footer}"></footer>
</main>

<div th:replace="~{layouts/main :: toastContainer}"></div>
<div th:replace="~{layouts/main :: scripts}"></div>

<script>
    // Toggle active label based on switch state
    document.addEventListener('DOMContentLoaded', function() {
        const enabledSwitch = document.getElementById('enabled');
        const enabledLabel = document.querySelector('label[for="enabled"]');
        if(enabledSwitch && enabledLabel) {
            enabledSwitch.addEventListener('change', function() {
                enabledLabel.textContent = this.checked ? 'Active' : 'Disabled';
            });
        }
    });
</script>

</body>
</html>
